name: Job Scraper

on:
  schedule:
    - cron: "0 9 * * *"   # every day at 09:00 UTC
  workflow_dispatch:       # allows manual run

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          R -e 'install.packages(c("rvest","dplyr","readr"), repos="https://cloud.r-project.org")'

      - name: Run scraper
        run: Rscript job_scraper.R

      - name: Show results
        run: cat new_jobs.txt
