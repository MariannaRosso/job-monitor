name: Job Scraper

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            rvest
            dplyr
            readr

      - name: Run scraper
        run: Rscript job_scraper.R

      - name: Show results
        run: cat new_jobs.txt
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: New Job Alerts
          body: file://new_jobs.txt
          to: marianna.rosso3@gmail.com
          from: marianna.rosso3@gmail.com
